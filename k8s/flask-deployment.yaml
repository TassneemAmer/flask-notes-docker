apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
        - name: flask-app

          image: tassneem03/flask-notes-app:v1

          ports:
            - containerPort: 5000

          env:
            - name: DB_HOST
              value: mysql-service

            - name: DB_USER
              value: root

            - name: DB_PASSWORD
              value: rootpassword

            - name: DB_NAME
              value: notesdb