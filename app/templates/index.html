<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Notes App</title>

    <style>
        body {
            background-color: #f0f4ff;
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h1 {
            color: #1e3a8a;
        }

        h2 {
            color: #2563eb;
        }

        textarea {
            border: 2px solid #2563eb;
            border-radius: 8px;
            padding: 10px;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1e40af;
        }

        li {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <h1>Notes</h1>

    <form method="POST">
        <textarea name="content" rows="4" cols="50" placeholder="Write a note..." required></textarea>
        <br><br>
        <button type="submit">Add Note</button>
    </form>

    <hr>

    <h2>Existing Notes</h2>

    {% if notes %}
        <ul>
            {% for note in notes %}
                <li>
                    <strong>{{ note.created_at }}</strong><br>
                    {{ note.content }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No notes yet.</p>
    {% endif %}
</body>
</html>
