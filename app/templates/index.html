<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Notes App</title>
</head>
<body>
    <h1>Notes</h1>

    <form method="POST">
        <textarea name="content" rows="4" cols="50" placeholder="Write a note..." required></textarea>
        <br><br>
        <button type="submit">Add Note</button>
    </form>

    <hr>

    <h2>Existing Notes</h2>

    {% if notes %}
        <ul>
            {% for note in notes %}
                <li>
                    <strong>{{ note.created_at }}</strong><br>
                    {{ note.content }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No notes yet.</p>
    {% endif %}
</body>
</html>
